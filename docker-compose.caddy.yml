services:
  caddy:
    image: caddy:2.10.2-alpine
    depends_on:
      - ovumcy-sync-community
    environment:
      SYNC_SITE_ADDRESS: "${SYNC_SITE_ADDRESS:-:80}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
