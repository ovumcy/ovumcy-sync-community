# Dependabot keeps Go modules, GitHub Actions (SHA pins), and the Docker base
# image current between manual review passes.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/oss-fuzz"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
