name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.6.1

      - name: Staticcheck
        run: $(go env GOPATH)/bin/staticcheck ./...

  go-vet:
    name: go-vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vet
        run: go vet ./...

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Go test with coverage
        run: go test -race ./... -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        id: codecov
        # Coverage upload is reporting, not a merge gate: the tests already ran
        # and passed before this step. A Codecov ingest/OIDC hiccup must never
        # fail CI. This was advisory on push only; the pull_request OIDC upload
        # path is unreliable (and was never exercised while the repo pushed
        # straight to main), so make it non-blocking on every event. The
        # follow-up step still surfaces a warning.
        continue-on-error: true
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          use_oidc: true
          fail_ci_if_error: true

      - name: Warn on non-blocking Codecov failure
        if: ${{ steps.codecov.outcome == 'failure' }}
        run: echo "::warning::Codecov upload failed. Tests ran and passed; Codecov ingest returned an external error (non-blocking)."

  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Docker Compose config
        run: docker compose config

      - name: Docker Compose config with Caddy example
        run: docker compose -f docker-compose.yml -f docker-compose.caddy.yml config

      - name: Docker build
        run: docker build -t ovumcy-sync-community-ci:${{ github.sha }} .

      - name: Runtime smoke
        run: IMAGE=ovumcy-sync-community-ci:${{ github.sha }} bash ./scripts/runtime-smoke.sh
