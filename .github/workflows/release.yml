name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types:
      - published

# Least privilege at the top; the job widens only what it needs (mirrors the
# other workflows). contents:write uploads release assets, id-token:write is
# for cosign keyless signing + provenance OIDC, attestations:write is for the
# SLSA build-provenance attestation.
permissions:
  contents: read

jobs:
  release-artifacts:
    name: Build, sign, and attach release binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        env:
          VERSION: ${{ github.event.release.tag_name }}
        # Build flags mirror the Dockerfile runtime binary (CGO_ENABLED=0,
        # -trimpath, -ldflags="-s -w") so a release binary is byte-comparable
        # to what ships in the image. Platforms match the published image
        # (linux/amd64, linux/arm64) — this is a self-hosted server backend, so
        # only Linux server targets are produced.
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            out="dist/ovumcy-sync-community_${VERSION}_${os}_${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w" \
              -o "$out" ./cmd/ovumcy-sync-community
          done

      - name: Generate checksums
        working-directory: dist
        run: sha256sum ovumcy-sync-community_* > SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums (keyless)
        working-directory: dist
        # One signature over the checksum manifest covers every binary: a
        # verifier confirms SHA256SUMS.sig, then checks each binary against
        # SHA256SUMS. Keyless (Fulcio/Rekor) — no long-lived key to manage.
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/ovumcy-sync-community_*

      - name: Upload signed artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        working-directory: dist
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            ovumcy-sync-community_* \
            SHA256SUMS SHA256SUMS.sig SHA256SUMS.pem \
            --clobber
