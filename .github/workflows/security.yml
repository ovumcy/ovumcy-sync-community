name: Security

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRIVY_IMAGE: aquasec/trivy:0.68.2@sha256:05d0126976bdedcd0782a0336f77832dbea1c81b9cc5e4b3a5ea5d2ec863aca7

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "41 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      GOBIN: ${{ github.workspace }}/.bin

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4

      - name: Prepare security artifact directory
        run: mkdir -p .tmp/security

      - name: Run gosec
        # Scoped to the module's product-code trees, not ./..., matching
        # ovumcy-web: scripts/ is CI tooling (see codecov.yml's `ignore:` and
        # scripts/patchcov's own isGatedFile), not part of the server's attack
        # surface, and its path/subprocess patterns (reading a coverage file
        # named by an env var, diffing against a caller-supplied git ref) are
        # inherent to a local dev-and-CI tool, not something to review at the
        # same bar as the network-facing auth/blob/session code in cmd and
        # internal.
        run: ./.bin/gosec -fmt sarif -out .tmp/security/gosec.sarif ./cmd/... ./internal/...

      - name: Upload gosec SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: .tmp/security/gosec.sarif
          category: gosec

      - name: Upload gosec artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gosec-results
          path: .tmp/security/gosec.sarif
          if-no-files-found: error

  govulncheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      # Call-graph reachability gate: fails only when the code actually calls
      # a vulnerable symbol; Trivy covers vulnerable-but-unreachable packages.
      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  trivy-fs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare security artifact directory
        run: mkdir -p .tmp/security

      - name: Run Trivy filesystem scan
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work "${{ env.TRIVY_IMAGE }}" fs --scanners vuln --skip-version-check --severity HIGH,CRITICAL --ignore-unfixed --format sarif --output .tmp/security/trivy-fs.sarif --exit-code 1 .

      - name: Upload Trivy filesystem SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: .tmp/security/trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy filesystem artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-fs-results
          path: .tmp/security/trivy-fs.sarif
          if-no-files-found: error

  trivy-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build runtime image for scanning
        run: docker build --tag ovumcy-sync-community-security:${{ github.sha }} .

      - name: Prepare security artifact directory
        run: mkdir -p .tmp/security

      - name: Run Trivy image scan
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "${{ github.workspace }}:/work" -w /work "${{ env.TRIVY_IMAGE }}" image --scanners vuln --skip-version-check --severity HIGH,CRITICAL --ignore-unfixed --format sarif --output .tmp/security/trivy-image.sarif --exit-code 1 ovumcy-sync-community-security:${{ github.sha }}

      - name: Generate CycloneDX SBOM
        if: always()
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "${{ github.workspace }}:/work" -w /work "${{ env.TRIVY_IMAGE }}" image --skip-version-check --format cyclonedx --output .tmp/security/ovumcy-sync-community-image.cdx.json ovumcy-sync-community-security:${{ github.sha }}

      - name: Upload Trivy image SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: .tmp/security/trivy-image.sarif
          category: trivy-image

      - name: Upload Trivy image artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-results
          path: |
            .tmp/security/trivy-image.sarif
            .tmp/security/ovumcy-sync-community-image.cdx.json
          if-no-files-found: error
