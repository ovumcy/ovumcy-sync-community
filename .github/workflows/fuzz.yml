name: Fuzz

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Sundays 12:00 UTC; live fuzzing catches stale fuzz oracles that stay
    # green on the seed corpus during regular CI runs.
    - cron: "0 12 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzNormalizeLogin
          - FuzzValidateLogin
          - FuzzNormalizeRecoveryCode
          - FuzzDecodeTOTPSecretBase32
          - FuzzFieldCryptoRoundTrip

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Fuzz ${{ matrix.target }}
        # -run '^$' skips unit tests; -fuzz runs only the matrix target for 3m.
        run: go test ./internal/security/ -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime=3m

      - name: Upload crashers
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: fuzz-crashers-${{ matrix.target }}
          path: internal/security/testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 7
