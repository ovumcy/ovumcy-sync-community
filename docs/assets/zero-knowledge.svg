<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>Ovumcy sync-community zero-knowledge boundary</title>
  <desc>The Ovumcy app on the owner's device encrypts all health data with a master key the server never receives. Only ciphertext and metadata cross the zero-knowledge boundary. The sync server stores account, session, and device metadata plus opaque ciphertext, and never sees cycle dates, symptoms, notes, the recovery phrase, the client master key, or any decrypted payload.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5F5E5A"/>
    </marker>
  </defs>

  <text x="290" y="52" text-anchor="middle" font-size="12" font-weight="500" fill="#5F5E5A">zero-knowledge boundary</text>
  <line x1="290" y1="64" x2="290" y2="388" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 4"/>

  <rect x="40" y="90" width="180" height="110" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="56" y="120" font-size="14" font-weight="500" fill="#04342C">Ovumcy app</text>
  <text x="56" y="140" font-size="12" fill="#0F6E56">on your device</text>
  <text x="56" y="167" font-size="12" fill="#04342C">cycle data, symptoms,</text>
  <text x="56" y="185" font-size="12" fill="#04342C">notes — encrypted here</text>

  <text x="287" y="132" text-anchor="middle" font-size="12" fill="#5F5E5A">ciphertext only</text>
  <line x1="222" y1="145" x2="352" y2="145" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="360" y="70" width="280" height="150" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="376" y="98" font-size="14" font-weight="500" fill="#2C2C2A">Sync server stores</text>
  <text x="376" y="124" font-size="12" fill="#2C2C2A">· account login, session &amp; device IDs</text>
  <text x="376" y="144" font-size="12" fill="#2C2C2A">· blob metadata, checksums, sizes</text>
  <text x="376" y="164" font-size="12" fill="#2C2C2A">· wrapped recovery-key package</text>
  <text x="376" y="184" font-size="12" fill="#2C2C2A">· password + recovery-code hashes</text>
  <text x="376" y="204" font-size="12" fill="#2C2C2A">· TOTP secret (AES-GCM), ciphertext</text>

  <rect x="360" y="245" width="280" height="135" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="376" y="273" font-size="14" font-weight="500" fill="#4A1B0C">Never sees</text>
  <text x="376" y="299" font-size="12" fill="#4A1B0C">· cycle dates, symptoms, notes</text>
  <text x="376" y="319" font-size="12" fill="#4A1B0C">· recovery phrase</text>
  <text x="376" y="339" font-size="12" fill="#4A1B0C">· client master key</text>
  <text x="376" y="359" font-size="12" fill="#4A1B0C">· any decrypted sync payload</text>

  <text x="340" y="406" text-anchor="middle" font-size="12" fill="#5F5E5A">Plaintext never crosses the boundary — only ciphertext and metadata.</text>
</svg>
