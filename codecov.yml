# Validate changes before merge:
# curl -X POST --data-binary @codecov.yml https://codecov.io/validate

codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
        informational: false
    patch:
      default:
        target: auto
        threshold: 0%
        informational: false

github_checks:
  annotations: true
