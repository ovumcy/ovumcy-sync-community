# Validate changes before merge:
# curl -X POST --data-binary @codecov.yml https://codecov.io/validate

codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
        informational: false
    patch:
      default:
        # The 100% modified-lines rule is ENFORCED by the in-CI
        # scripts/patchcov job (required status "patch-coverage"), which
        # understands this repo's inline `// codecov:ignore` convention for
        # genuinely unreachable lines. The Codecov service cannot parse those
        # annotations and would double-report them as failures, so its patch
        # status is informational: dashboards and PR annotations only, never
        # a second gate.
        target: 100%
        threshold: 0%
        informational: true

# Tooling is excluded from coverage reporting, matching the in-CI
# scripts/patchcov gate. This is not product code. (Unlike the sibling
# ovumcy-web repo, this module has no internal/testdb equivalent to add here.)
ignore:
  - "scripts"

github_checks:
  annotations: true

# The authoritative patch gate is the in-CI scripts/patchcov job (required
# status "patch-coverage"), which understands this repo's inline codecov:ignore
# convention. The Codecov service cannot parse those annotations, so its PR
# comment miscounts them as uncovered; suppress the comment to avoid a
# misleading second opinion (its status is already informational).
comment: false
