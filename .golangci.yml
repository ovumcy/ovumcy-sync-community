# golangci-lint v2 configuration (CI pins v2.12.2 in .github/workflows/ci.yml).
#
# Baseline: the standard default linters (errcheck, govet, ineffassign,
# staticcheck, unused) — exactly what CI ran before this file existed, so
# adding the file changes nothing about the checks the repo already passed.
#
# Additions are conservative, objective linters the tree is verifiably clean
# under (CI's zero-issue run enforces it stays that way) with no style churn
# or subjective rules:
#   - copyloopvar: flags loop-variable copies made redundant by Go 1.22
#     per-iteration loop variables; pure dead code under go 1.26.
#   - intrange: canonical Go 1.22 `for i := range n` counting loops instead
#     of the three-clause form.
#   - misspell: objective spelling fixes in comments and strings; locale left
#     at the default, matching the codebase's existing spelling.
#   - unconvert: removes type conversions that are no-ops; they only obscure
#     the actual types in security-relevant code.
#
# Deliberately NOT enabled:
#   - gocritic, unparam: mirroring the sibling repo ovumcy-web's evaluation
#     (fix-or-drop rule) rather than re-deriving it here; both need a
#     case-by-case audit (signature refactors for unparam, intentional
#     patterns for gocritic's default set) instead of mechanical adoption.
#   - gosec: this repo already runs a dedicated gosec job (SARIF upload to
#     the GitHub Security tab, see .github/workflows/security.yml) with
#     reviewed #nosec annotations (G101 in internal/services, G202 in
#     internal/db, G505/G115 in internal/security). Enabling gosec here too
#     would duplicate that gate without adding coverage, and risks a second,
#     differently-configured place where those annotations could silently
#     stop being honored.
#
# The repo carries zero //nolint directives; keep it that way. If a new
# finding is a false positive, prefer narrowing the linter's settings here
# (with a comment) over inline suppressions.
version: "2"

linters:
  default: standard
  enable:
    - copyloopvar
    - intrange
    - misspell
    - unconvert
