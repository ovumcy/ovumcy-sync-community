services:
  ovumcy-sync-community:
    build:
      context: .
    command: ["serve"]
    environment:
      BIND_ADDR: ":8080"
      DB_PATH: "/data/ovumcy-sync-community.sqlite"
      SESSION_TTL: "720h"
      MAX_DEVICES: "5"
      MAX_BLOB_BYTES: "16777216"
      AUTH_RATE_LIMIT_COUNT: "10"
      AUTH_RATE_LIMIT_WINDOW: "1m"
      METRICS_ENABLED: "false"
      METRICS_BEARER_TOKEN: ""
      MANAGED_BRIDGE_TOKEN: ""
      ALLOWED_ORIGINS: ""
      TRUSTED_PROXY_CIDRS: ""
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    restart: unless-stopped
