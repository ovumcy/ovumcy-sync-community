services:
  init-data-perms:
    image: busybox:1.36
    # The app runs as nonroot uid 65532 (distroless); ensure the bind-mounted
    # ./data is writable by it before the app starts. Runs once and exits.
    command: ["sh", "-c", "mkdir -p /data && chown -R 65532:65532 /data"]
    volumes:
      - ./data:/data
    restart: "no"

  ovumcy-sync-community:
    build:
      context: .
    command: ["serve"]
    depends_on:
      init-data-perms:
        condition: service_completed_successfully
    environment:
      BIND_ADDR: ":8080"
      DB_PATH: "/data/ovumcy-sync-community.sqlite"
      SESSION_TTL: "720h"
      MAX_DEVICES: "5"
      MAX_BLOB_BYTES: "16777216"
      AUTH_RATE_LIMIT_COUNT: "10"
      AUTH_RATE_LIMIT_WINDOW: "1m"
      METRICS_ENABLED: "false"
      METRICS_BEARER_TOKEN: ""
      MANAGED_BRIDGE_TOKEN: ""
      ALLOWED_ORIGINS: ""
      TRUSTED_PROXY_CIDRS: ""
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    restart: unless-stopped
